<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>垃圾分类智能助手 - EcoBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1a14;
      --bg-secondary: #122218;
      --fg: #e6f4ea;
      --muted: #6b9b7a;
      --accent: #00e676;
      --accent-dim: #00c853;
      --card: rgba(18, 38, 28, 0.72);
      --border: rgba(0, 230, 118, 0.14);
      --recyclable: #29b6f6;
      --hazardous: #ef5350;
      --kitchen: #9ccc65;
      --other: #90a4ae;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display { font-family: 'Space Grotesk', sans-serif; }

    /* 背景动效 */
    .bg-visuals {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.45;
      animation: orbFloat 25s ease-in-out infinite;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 230, 118, 0.4) 0%, transparent 70%);
      top: -200px;
      right: -100px;
    }

    .orb-2 {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(41, 182, 246, 0.3) 0%, transparent 70%);
      bottom: 10%;
      left: -150px;
      animation-delay: -8s;
    }

    .orb-3 {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(156, 204, 101, 0.25) 0%, transparent 70%);
      top: 45%;
      right: 5%;
      animation-delay: -16s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -50px) scale(1.1); }
      66% { transform: translate(-40px, 40px) scale(0.95); }
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 230, 118, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 230, 118, 0.035) 1px, transparent 1px);
      background-size: 65px 65px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 75%);
    }

    .noise-layer {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* 玻璃态卡片 */
    .glass {
      background: var(--card);
      backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 26px;
    }

    /* 聊天容器 */
    .chat-wrapper {
      height: calc(100vh - 160px);
      max-height: 680px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* 消息样式 */
    .msg {
      max-width: 90%;
      animation: msgSlide 0.38s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-user {
      margin-left: auto;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      border-radius: 22px 22px 6px 22px;
      padding: 15px 24px;
      font-weight: 500;
    }

    .msg-bot {
      margin-right: auto;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 22px 22px 22px 6px;
      padding: 20px 24px;
    }

    /* 分类标签 */
    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      margin: 12px 0;
    }

    .cat-recyclable {
      background: rgba(41, 182, 246, 0.2);
      color: #4fc3f7;
      border: 1px solid rgba(41, 182, 246, 0.4);
    }

    .cat-hazardous {
      background: rgba(239, 83, 80, 0.2);
      color: #ff8a80;
      border: 1px solid rgba(239, 83, 80, 0.4);
    }

    .cat-kitchen {
      background: rgba(156, 204, 101, 0.2);
      color: #c5e1a5;
      border: 1px solid rgba(156, 204, 101, 0.4);
    }

    .cat-other {
      background: rgba(144, 164, 174, 0.2);
      color: #b0bec5;
      border: 1px solid rgba(144, 164, 174, 0.4);
    }

    /* 输入区域 */
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: rgba(13, 26, 20, 0.65);
      border-radius: 0 0 26px 26px;
    }

    .chat-input {
      background: rgba(0, 0, 0, 0.38);
      border: 2px solid var(--border);
      border-radius: 18px;
      color: var(--fg);
      transition: all 0.32s ease;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 5px rgba(0, 230, 118, 0.18);
    }

    .chat-input::placeholder { color: var(--muted); }

    /* 按钮 */
    .btn-send {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      border-radius: 16px;
      font-weight: 700;
      transition: all 0.32s ease;
      border: none;
      cursor: pointer;
    }

    .btn-send:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 10px 32px rgba(0, 230, 118, 0.35);
    }

    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-voice {
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.32s ease;
    }

    .btn-voice:hover { border-color: var(--accent); color: var(--accent); }

    .btn-voice.recording {
      background: rgba(239, 83, 80, 0.2);
      border-color: #ef5350;
      color: #ef5350;
      animation: recordPulse 1.5s ease-in-out infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 83, 80, 0.5); }
      50% { box-shadow: 0 0 0 14px rgba(239, 83, 80, 0); }
    }

    /* 快捷按钮 */
    .quick-btn {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--fg);
      cursor: pointer;
      transition: all 0.32s ease;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: rgba(0, 230, 118, 0.18);
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    /* 打字指示器 */
    .typing-area { display: flex; gap: 6px; padding: 20px 24px; }

    .typing-dot {
      width: 10px;
      height: 10px;
      background: var(--muted);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes typingBounce {
      0%, 55%, 100% { transform: translateY(0); }
      30% { transform: translateY(-14px); }
    }

    /* 示例列表 */
    .example-list {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .example-chip {
      font-size: 13px;
      padding: 5px 14px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      margin: 3px;
      display: inline-block;
    }

    /* 侧边栏 */
    .sidebar-item {
      transition: all 0.3s ease;
    }

    .sidebar-item:hover {
      background: rgba(0, 230, 118, 0.12);
    }

    .sidebar-item.active {
      background: rgba(0, 230, 118, 0.18);
      border-left: 3px solid var(--accent);
    }

    /* 统计数字 */
    .stat-num {
      background: linear-gradient(135deg, var(--accent) 0%, #29b6f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .chat-wrapper { height: calc(100vh - 140px); max-height: none; }
      .desktop-only { display: none; }
      .msg { max-width: 96%; }
    }

    /* 减少动效 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- 背景效果 -->
  <div class="bg-visuals">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="grid-bg"></div>
    <div class="noise-layer"></div>
  </div>

  <!-- 主布局 -->
  <div class="relative z-10 flex h-screen">
    
    <!-- 侧边栏 -->
    <aside class="desktop-only w-72 border-r border-[var(--border)] p-5 flex flex-col">
      <div class="mb-8">
        <div class="flex items-center gap-4 mb-3">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[var(--accent)] to-emerald-600 flex items-center justify-center shadow-lg shadow-[rgba(0,230,118,0.25)]">
            <svg class="w-7 h-7 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </div>
          <div>
            <h1 class="font-display font-bold text-xl">EcoBot</h1>
            <p class="text-xs text-[var(--muted)]">智能垃圾分类助手</p>
          </div>
        </div>
      </div>

      <!-- 分类导航 -->
      <div class="mb-6">
        <p class="text-xs text-[var(--muted)] uppercase tracking-widest mb-4 font-medium">快速查询分类</p>
        <nav class="space-y-2">
          <button class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-4" data-category="recyclable">
            <span class="w-3 h-3 rounded-full bg-[#29b6f6] shadow-lg shadow-[#29b6f6]/35"></span>
            <span>可回收物</span>
            <span class="ml-auto text-xs text-[var(--muted)]">蓝桶</span>
          </button>
          <button class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-4" data-category="hazardous">
            <span class="w-3 h-3 rounded-full bg-[#ef5350] shadow-lg shadow-[#ef5350]/35"></span>
            <span>有害垃圾</span>
            <span class="ml-auto text-xs text-[var(--muted)]">红桶</span>
          </button>
          <button class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-4" data-category="kitchen">
            <span class="w-3 h-3 rounded-full bg-[#9ccc65] shadow-lg shadow-[#9ccc65]/35"></span>
            <span>厨余垃圾</span>
            <span class="ml-auto text-xs text-[var(--muted)]">绿桶</span>
          </button>
          <button class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-4" data-category="other">
            <span class="w-3 h-3 rounded-full bg-[#90a4ae] shadow-lg shadow-[#90a4ae]/35"></span>
            <span>其他垃圾</span>
            <span class="ml-auto text-xs text-[var(--muted)]">灰桶</span>
          </button>
        </nav>
      </div>

      <!-- 数据统计 -->
      <div class="mt-auto">
        <div class="glass p-5 rounded-2xl">
          <p class="text-xs text-[var(--muted)] mb-4 font-medium">数据库统计</p>
          <div class="grid grid-cols-2 gap-5 text-center">
            <div>
              <p class="stat-num text-3xl font-bold font-display">200+</p>
              <p class="text-xs text-[var(--muted)] mt-1">物品数据</p>
            </div>
            <div>
              <p class="stat-num text-3xl font-bold font-display">4</p>
              <p class="text-xs text-[var(--muted)] mt-1">分类标准</p>
            </div>
          </div>
        </div>
        <p class="text-xs text-center text-[var(--muted)] mt-4 opacity-70">数据参考国家标准</p>
      </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="flex-1 flex flex-col p-5">
      <div class="glass chat-wrapper w-full max-w-3xl mx-auto flex flex-col">
        
        <!-- 头部 -->
        <header class="px-6 py-4 border-b border-[var(--border)] flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-[var(--accent)] animate-pulse shadow-lg shadow-[rgba(0,230,118,0.3)]"></div>
            <span class="text-sm text-[var(--muted)]">在线 · 随时为您解答垃圾分类问题</span>
          </div>
          <button id="clearBtn" class="text-[var(--muted)] hover:text-[var(--accent)] text-sm transition-colors font-medium">
            清空对话
          </button>
        </header>

        <!-- 消息区域 -->
        <div id="chatMessages" class="chat-messages flex-1 space-y-5">
          <!-- 欢迎消息 -->
          <div class="msg msg-bot">
            <div class="flex items-start gap-4">
              <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-[var(--accent)] to-emerald-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-[rgba(0,230,118,0.25)]">
                <svg class="w-6 h-6 text-[var(--bg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
              </div>
              <div class="flex-1">
                <p class="text-xs text-[var(--muted)] mb-2 font-medium">EcoBot 智能助手</p>
                <p class="leading-relaxed mb-3">你好！我是EcoBot垃圾分类智能助手，我可以帮你查询任何物品的垃圾分类。</p>
                <p class="leading-relaxed text-[var(--muted)] text-sm mb-3">你可以这样问我：</p>
                <div class="flex flex-wrap gap-2">
                  <button class="quick-btn text-xs" data-query="电池是什么垃圾">电池是什么垃圾？</button>
                  <button class="quick-btn text-xs" data-query="塑料瓶怎么扔">塑料瓶怎么扔？</button>
                  <button class="quick-btn text-xs" data-query="剩饭剩菜分类">剩饭剩菜属于什么？</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
          <div class="flex gap-3 mb-4">
            <button id="voiceBtn" class="btn-voice p-4 flex-shrink-0" title="语音输入">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
              </svg>
            </button>
            <input 
              type="text" 
              id="chatInput" 
              class="chat-input flex-1 px-5 py-4 text-base"
              placeholder="输入物品名称或问题，如：电池是什么垃圾？"
              autocomplete="off"
            >
            <button id="sendBtn" class="btn-send px-8 text-base">发送</button>
          </div>
          
          <!-- 快捷问题 -->
          <div class="flex flex-wrap gap-2">
            <button class="quick-btn text-xs" data-query="可回收物有哪些">可回收物有哪些</button>
            <button class="quick-btn text-xs" data-query="有害垃圾包括什么">有害垃圾包括什么</button>
            <button class="quick-btn text-xs" data-query="厨余垃圾怎么处理">厨余垃圾怎么处理</button>
            <button class="quick-btn text-xs" data-query="其他垃圾的定义">其他垃圾的定义</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ==================== 垃圾分类数据库 ====================
    const GARBAGE_DB = {
      // 可回收物

      // 有害垃圾
      '电池': { cat: 'hazardous', name: '有害垃圾', tip: '投放至专用有害垃圾收集容器，不要与其他垃圾混放', examples: ['干电池', '充电电池', '纽扣电池'] },

    // ==================== 核心函数 ====================
    
    // 查找垃圾信息
    function findItem(query) {
      const q = query.toLowerCase().trim();
      
      const patterns = [
        /^(.+?)是什么垃圾/,
        /^(.+?)怎么(扔|丢|处理|分类)/,
        /^(.+?)属于什么/,
        /^什么是(.+)/,
        /^请问(.+)/,
        /^(.+?)是(可回收|有害|厨余|其他)垃圾吗/,
      ];
      
      let itemName = query;
      for (const p of patterns) {
        const m = q.match(p);
        if (m) { itemName = m[1]; break; }
      }
      
      // 直接匹配
      for (const key in GARBAGE_DB) {
        if (key.toLowerCase() === itemName.toLowerCase()) {
          return { key, ...GARBAGE_DB[key] };
        }
      }
      
      // 模糊匹配
      for (const key in GARBAGE_DB) {
        if (itemName.includes(key) || key.includes(itemName)) {
          return { key, ...GARBAGE_DB[key] };
        }
      }
      
      // 关键词匹配
      const kw = { '电池': '电池', '电': '电池', '瓶': '塑料瓶', '塑料': '塑料瓶', '纸': '废纸', '玻璃': '玻璃', '饭': '剩饭剩菜', '菜': '剩饭剩菜', '果': '果皮', '药': '过期药品', '口': '口罩', '灯': '灯管', '衣服': '旧衣服', '书': '书籍', '罐': '易拉罐' };
      
      for (const [k, v] of Object.entries(kw)) {
        if (q.includes(k)) return { key: v, ...GARBAGE_DB[v] };
      }
      
      return null;
    }

    // 处理输入
    function processInput(input) {
      const q = input.toLowerCase().trim();
      
      if (q.includes('可回收') && (q.includes('有哪') || q.includes('包括') || q.includes('什么'))) {
        return genCategoryResponse('recyclable');
      }
      if (q.includes('有害') && (q.includes('有哪') || q.includes('包括') || q.includes('什么'))) {
        return genCategoryResponse('hazardous');
      }
      if (q.includes('厨余') && (q.includes('有哪') || q.includes('包括') || q.includes('什么') || q.includes('怎么处理'))) {
        return genCategoryResponse('kitchen');
      }
      if (q.includes('其他') && (q.includes('定义') || q.includes('包括') || q.includes('什么'))) {
        return genCategoryResponse('other');
      }
      
      if ((q.includes('分类') && (q.includes('有哪') || q.includes('几种'))) || q.includes('四大分类')) {
        return genAllCats();
      }
      
      if (q.includes('你好') || q.includes('您好') || q.includes('hi') || q.includes('hello')) {
        return `<p>你好！我是EcoBot垃圾分类助手。</p><p class="mt-2">请告诉我您想了解什么物品的分类，我会为您提供详细的分类信息和投放建议。</p>`;
      }
      
      if (q.includes('谢谢') || q.includes('感谢')) {
        return `<p>不客气！很高兴能帮到您。</p><p class="mt-2 text-[var(--muted)] text-sm">如有其他垃圾分类问题，随时可以问我哦！</p>`;
      }
      
      const info = findItem(input);
      if (info) return genItemResponse(info);
      
      return null;
    }

    // 生成物品回答
    function genItemResponse(info) {
      const cat = CAT_INFO[info.cat];
      let r = `<div class="cat-tag cat-${info.cat}">${cat.name}</div>`;
      r += `<p class="mb-3"><strong class="text-[var(--accent)]">"${info.key}"</strong> 属于 <strong style="color: ${cat.color}">${info.name}</strong>。</p>`;
      r += `<p class="text-sm text-[var(--muted)] mb-3 bg-[rgba(0,0,0,0.25)] p-4 rounded-xl">投放提示：${info.tip}</p>`;
      
      if (info.examples && info.examples.length > 0) {
        r += `<div class="example-list">
          <p class="text-xs text-[var(--muted)] mb-2">同类物品示例：</p>
          <div>${info.examples.map(ex => `<span class="example-chip">${ex}</span>`).join('')}</div>
        </div>`;
      }
      
      return r;
    }

    // 生成分类型绍
    function genCategoryResponse(cat) {
      const info = CAT_INFO[cat];
      let r = `<div class="cat-tag cat-${cat}">${info.name}</div>`;
      r += `<p class="mb-4">${info.desc}</p>`;
      r += `<div class="mt-4"><p class="text-sm text-[var(--muted)] mb-3 font-medium">常见物品：</p><ul class="space-y-2 text-sm">`;
      r += info.items.map(item => `
        <li class="flex items-start gap-3">
          <span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style="background: ${info.color}"></span>
          <span>${item}</span>
        </li>
      `).join('');
      r += `</ul></div>`;
      return r;
    }

    // 生成所有分类

      let r = `<p class="mb-4">生活垃圾主要分为以下四大类：</p>`;

      for (const [k, info] of Object.entries(CAT_INFO)) {
        r += `<div class="p-4 rounded-xl border border-[var(--border)]" style="background: ${info.color}18">
          <div class="flex items-center gap-2 mb-2">
            <span class="w-2.5 h-2.5 rounded-full" style="background: ${info.color}"></span>
            <span class="font-semibold" style="color: ${info.color}">${info.name}</span>
          </div>
          <p class="text-xs text-[var(--muted)] leading-relaxed">${info.desc.slice(0, 35)}...</p>
        </div>`;
      }
      r += `</div>`;
      return r;
    }
